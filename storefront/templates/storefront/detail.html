{% extends 'storefront/base.html' %}

{% block content %}
<div class="container">
    <div class="product-detail-container">
        <div class="product-detail-image">
            <img src="{{ product.image_url }}" alt="{{ product.name }}">
        </div>
        <div class="product-detail-info">
            <h2>{{ product.name }}</h2>
            <div class="meta-info">
                <span>ยอดขาย {{ product.sold }} ชิ้น</span>
                <span>หมวดหมู่: {{ product.category.name }}</span>
            </div>
            <div class="price-box">
                ฿{{ product.price }}
            </div>
            <div class="description-box">
                <h3>รายละเอียดสินค้า</h3>
                <p>{{ product.description }}</p>
                <p><strong>สินค้าคงเหลือ:</strong> {{ product.stock }} ชิ้น</p>
            </div>
            
            <div class="actions">
                <form action="{% url 'add_to_cart' product.id %}" method="post" style="display:flex; gap:15px; width:100%;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline" style="flex:1;">เพิ่มไปยังรถเข็น</button>
                    <button type="submit" class="btn btn-primary" style="flex:1;">ซื้อสินค้า</button>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
.product-detail-container {
    display: flex;
    background: var(--white);
    padding: 30px;
    border-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    gap: 40px;
}
.product-detail-image {
    flex: 0 0 40%;
}
.product-detail-image img {
    width: 100%;
    border-radius: 4px;
    border: 1px solid var(--border-color);
}
.product-detail-info {
    flex: 1;
}
.product-detail-info h2 {
    font-size: 24px;
    font-weight: 500;
    margin-bottom: 10px;
}
.meta-info {
    color: var(--text-light);
    font-size: 14px;
    margin-bottom: 20px;
    display: flex;
    gap: 20px;
}
.price-box {
    background: #fafafa;
    padding: 20px;
    font-size: 32px;
    color: var(--primary-color);
    font-weight: 500;
    margin-bottom: 30px;
}
.description-box {
    margin-bottom: 30px;
}
.description-box h3 {
    font-size: 16px;
    margin-bottom: 10px;
}
.actions {
    display: flex;
    gap: 15px;
}
.btn {
    padding: 12px 20px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 2px;
    min-width: 150px;
    text-align: center;
}
.btn-outline {
    background: #ffeee8;
    color: var(--primary-color);
    border: 1px solid var(--primary-color);
}
.btn-primary {
    background: var(--primary-color);
    color: var(--white);
    border: 1px solid var(--primary-color);
}
</style>
{% endblock %}
